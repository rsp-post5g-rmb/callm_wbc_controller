# This configuration is used to run a few iterations of the controller as a smoke
# test. It requires the UR5e and TriOrb robot modules to be available on the module
# path (they are, when built inside mc_rtc_superbuild).
MainRobot: UR5eFloatingBase
Enabled: CallmWbcController

ClearControllerModulePath: true
ControllerModulePaths: ["$<TARGET_FILE_DIR:CallmWbcController>"]
